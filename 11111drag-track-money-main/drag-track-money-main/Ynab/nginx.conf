server {
    listen 80;

    # Onde os arquivos do frontend estao
    root /usr/share/nginx/html;
    index index.html;

    # Qualquer rota do React deve devolver o index.html (Client Side Routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Redireciona chamadas da /api para o Backend (Gunicorn)
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redireciona rotas de admin do Django e arquivos estaticos do admin
    location /admin/ {
        proxy_pass http://backend:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location /static/ {
        proxy_pass http://backend:8000/static/;
        proxy_set_header Host $host;
    }
}
